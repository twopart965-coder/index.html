<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abanoub  ❤️   Marina</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(150deg, #111111, #b80aec);
        font-family: 'Poppins', sans-serif;
    }

    .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 50px 80px;
        border-radius: 25px;
        backdrop-filter: blur(20px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 120px;
        color: white;
        letter-spacing: 20px;
    }

    .heart {
        color: red;
        animation: pulse 1s infinite;
        display: inline-block;
        font-size: 110px;
    }


    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .names {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    .name {
        font-size: 60px;
        font-weight: bold;
        color: #faf7f7;
        text-transform: uppercase;
    }

    .footer {
        margin-top: 10px;
        color: #f7f5f5;
        font-size: 45px;
        opacity: 0.8;
    }
</style>

</head>

<body>

<div class="container">
    <div class="names">
        <div class="name">Abanoub</div>
        <div class="heart">❤️</div>
        <div class="name">Marina</div>
    </div>

    <div class="footer">Made with love 💫</div>
</div>

</body>
</html>
